spring.application.name=message-service
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
grpc.client.guild-service.address=${GUILD_SERVICE_GRPC_ADDR}
grpc.client.guild-service.negotiation-type=plaintext
spring.cloud.aws.s3.bucket=${S3_BUCKET_NAME}
spring.cloud.aws.region=${AWS_REGION}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_ACCESS_KEY_SECRET}
storage.asset-path=${STORAGE_ASSET_PATH}
storage.message-attachment-path=${STORAGE_ATTACHMENT_PATH}